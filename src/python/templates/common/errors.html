<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SkyScore | Error {{ status_code }}</title>
    <style>
        body {
            margin: 0;
            font-family: "Lucida Grande", Tahoma, Geneva, Verdana, Arial, Helvetica, sans-serif;
            background: #0b0b0b;
            color: #f4f4f4;
        }
        .wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            box-sizing: border-box;
        }
        .card {
            width: min(640px, 100%);
            background: #151515;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            padding: 28px;
            box-sizing: border-box;
        }
        .code {
            color: gold;
            font-size: 14px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 30px;
        }
        p {
            margin: 0 0 16px 0;
            color: #d4d4d4;
            line-height: 1.5;
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .btn {
            display: inline-block;
            text-decoration: none;
            color: black;
            background-color: gold;
            border-bottom: 1px solid black;
            border-radius: 10px;
            padding: 6px 12px;
        }
        .btn:hover {
            color: gold;
            background-color: black;
            border-bottom-color: gold;
        }
        .meta {
            margin-top: 18px;
            color: #9f9f9f;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <div class="code">Error {{ status_code }}</div>
            <h1>{{ title }}</h1>
            <p>{{ message }}</p>
            <div class="actions">
                <a class="btn" href="{% url 'common:home' %}">Back to Home</a>
                <a class="btn" href="{% url 'common:login' %}">Login page</a>
            </div>
            <div class="meta">{{ current_date_time }}</div>
        </div>
    </div>
</body>
</html>
